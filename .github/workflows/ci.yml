name: Java CI/CD with Maven

# 触发条件：当代码推送到 main 分支或提交 PR 时触发
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # 指定运行环境为最新的 Ubuntu 虚拟服务器
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码（将仓库中的代码下载到虚拟机）
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK 环境（此处以 JDK 17 为例）
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # 使用 Eclipse Temurin 发行版
          java-version: '21'
          cache: 'maven'         # 开启 Maven 依赖缓存，大幅加快后续构建速度

      # 3. 运行 Maven 测试并打包
      - name: Build with Maven
        run: mvn clean package

      # 4. （可选）上传构建产物（如 jar 包）
#      - name: Upload Artifact
#        uses: actions/upload-artifact@v4
#        with:
#          name: java-app-jar
#          path: target/*.jar
