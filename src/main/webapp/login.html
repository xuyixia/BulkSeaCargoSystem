<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYSH Web 登录</title>
    <link rel="stylesheet" href="assets/app.css">
</head>
<body class="login-page">
<main class="login-box">
    <h1>HYSH Web</h1>
    <form id="loginForm">
        <div class="field wide"><label>账号</label><input name="username" autocomplete="username" required></div>
        <div class="field wide"><label>密码</label><input name="password" type="password" autocomplete="current-password" required></div>
        <div class="actions"><button>登录</button><a href="tracking.html">客户轨迹查询</a></div>
        <p class="msg"></p>
    </form>
</main>
<script src="assets/app.js"></script>
<script>
    bindSubmit("#loginForm", async form => {
        const body = Object.fromEntries(new FormData(form).entries());
        await api("api/auth/login", {method: "POST", body: JSON.stringify(body)});
        location.href = "index.html";
    });
</script>
</body>
</html>
